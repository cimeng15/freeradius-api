# Nginx Configuration for aaPanel
# Path: /www/server/panel/vhost/nginx/billing.syakirulilmi.my.id.conf

server {
    listen 80;
    listen 443 ssl http2;
    server_name billing.syakirulilmi.my.id;
    
    # SSL Configuration (aaPanel will add this automatically)
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;
    
    root /www/wwwroot/billing.syakirulilmi.my.id/public;
    index index.php index.html;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Logs
    access_log /www/wwwlogs/billing.syakirulilmi.my.id.log;
    error_log /www/wwwlogs/billing.syakirulilmi.my.id.error.log;
    
    # Disable access to hidden files
    location ~ /\. {
        deny all;
    }
    
    # Serve static files from React build
    location /app/ {
        try_files $uri $uri/ =404;
    }
    
    # API routes
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Storage files
    location /storage/ {
        try_files $uri $uri/ =404;
    }
    
    # Main location - serve React app
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-81.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Increase timeouts for long-running requests
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }
    
    # Deny access to sensitive files
    location ~ /\.(env|git|svn) {
        deny all;
        return 404;
    }
    
    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
