# FreeRADIUS Client Configuration
# ================================
# Secret HARUS sama dengan yang di-set di Mikrotik
# dan yang ada di tabel `nas` database

# Localhost (untuk radtest internal)
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    shortname = localhost
}

# Docker internal network
client dockernet {
    ipaddr = 172.16.0.0/12
    secret = testing123
    shortname = dockernet
}

# Semua private network (development only)
# Secret = radius123 (sama dengan yang di database/panel)
client private-network-1 {
    ipaddr = 192.168.0.0/16
    secret = radius123
    shortname = private-net
}

client private-network-2 {
    ipaddr = 10.0.0.0/8
    secret = radius123
    shortname = private-net-2
}
